name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and Lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: [1.21, 1.22]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: go mod download

    - name: Run linter
      uses: golangci/golangci-lint-action@v4
      with:
        version: latest
        args: --timeout=5m

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: [1.22]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: go mod download

    - name: Build for current platform
      run: go build -v -o xtris${{ matrix.os == 'windows-latest' && '.exe' || '' }} main.go

    - name: Build for all platforms
      run: |
        echo "Building for Windows (AMD64)..."
        GOOS=windows GOARCH=amd64 go build -v -o xtris.exe main.go
        echo "Building for macOS (AMD64)..."
        GOOS=darwin GOARCH=amd64 go build -v -o xtris-darwin-amd64 main.go
        echo "Building for macOS (ARM64)..."
        GOOS=darwin GOARCH=arm64 go build -v -o xtris-darwin-arm64 main.go
        echo "Building for Linux (AMD64)..."
        GOOS=linux GOARCH=amd64 go build -v -o xtris-linux-amd64 main.go
        echo "Building for Linux (ARM64)..."
        GOOS=linux GOARCH=arm64 go build -v -o xtris-linux-arm64 main.go

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xtris-builds-${{ matrix.os }}
        path: |
          xtris*
          !*.go
          !*.mod
          !*.sum
        retention-days: 7

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Run tests with coverage
      run: go test -v -coverprofile=coverage.out ./...

    - name: Generate coverage report
      run: |
        echo "Test Coverage Report:"
        go tool cover -func=coverage.out
        echo ""
        echo "Coverage Summary:"
        go tool cover -func=coverage.out | tail -1

    - name: Generate HTML coverage report
      run: go tool cover -html=coverage.out -o coverage.html

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.html
        retention-days: 30 